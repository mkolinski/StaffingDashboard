<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USA Staffing Services — Agent Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060e18; color: #cce4ff; font-family: 'Barlow', sans-serif; }
    #root { min-height: 100vh; }
  </style>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone (JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <!-- SheetJS (XLSX parsing) -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Recharts deps then Recharts UMD -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;
    const RC = window.Recharts || {};
    const BarChart = RC.BarChart;
    const Bar = RC.Bar;
    const XAxis = RC.XAxis;
    const YAxis = RC.YAxis;
    const CartesianGrid = RC.CartesianGrid;
    const Tooltip = RC.Tooltip;
    const ResponsiveContainer = RC.ResponsiveContainer;
    const AreaChart = RC.AreaChart;
    const Area = RC.Area;
    const Legend = RC.Legend;

    /* ─── STORAGE (localStorage for GitHub Pages) ───────────────────────────── */
    const STORAGE_KEY = "uss_weekly_uploads";
    const AGENTS_KEY  = "uss_agent_profiles";

    function loadStoredData() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { uploads: [], history: [] }; }
      catch { return { uploads: [], history: [] }; }
    }
    function saveStoredData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.error(e); }
    }
    function loadAgentProfiles() {
      try { return JSON.parse(localStorage.getItem(AGENTS_KEY)) || {}; } catch { return {}; }
    }
    function saveAgentProfiles(profiles) {
      try { localStorage.setItem(AGENTS_KEY, JSON.stringify(profiles)); } catch(e) { console.error(e); }
    }

    /* ─── BULLHORN XLSX PARSER ───────────────────────────────────────────────── */
    function parseBullhornXLSX(buffer) {
      const wb = XLSX.read(buffer, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { raw: false, defval: "" });
      const records = [];
      for (const row of rows) {
        const branch    = (row["Branch"] || "").trim();
        const candidate = (row["Candidate Name"] || "").trim();
        if (!branch || !candidate) continue;
        const periodRaw = row["Billing Period End Date"];
        let periodDate = null;
        if (periodRaw) { const d = new Date(periodRaw); if (!isNaN(d)) periodDate = d.toISOString().split("T")[0]; }
        const p = (v) => parseFloat(v) || 0;
        records.push({
          branch,
          customer:       (row["Customer"] || "").trim(),
          periodEnd:      periodDate,
          candidateName:  candidate,
          employeeType:   (row["Employee Type"] || "").trim(),
          jobTitle:       (row["Job Title"] || "").trim(),
          placementId:    row["Placement ID"] || "",
          payRate:        p(row["Pay Rate_"]),
          billRate:       p(row["Bill Rate_"]),
          regBillAmt:     p(row["Reg Bill Amount"]),
          regHoursBilled: p(row["Reg Hours Billed"]),
          otBillAmt:      p(row["OT Bill Amount"]),
          otHoursBilled:  p(row["OT Hours Billed"]),
          regPayAmt:      p(row["Reg Pay Amount"]),
          regHoursPaid:   p(row["Reg Hours Paid"]),
          otPayAmt:       p(row["OT Pay Amount"]),
          otHoursPaid:    p(row["OT Hours Paid"]),
          grossSales:     p(row["Gross Sales Amount"]),
          grossWages:     p(row["Gross Wages Amount"]),
          burdenPct:      p(row["Assignment Burden (%)"]),
          burdenAmt:      p(row["Assignment Burden ($)"]),
          agentProfit:    p(row["Staffing Agent Profit"]),
        });
      }
      return records;
    }

    /* ─── UTILITIES ──────────────────────────────────────────────────────────── */
    const fmt  = (n) => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtK = (n) => "$" + ((Number(n)||0)/1000).toFixed(1) + "k";
    const totalHours = (r) => r.regHoursBilled + r.otHoursBilled;

    function weekLabel(dateStr) {
      if (!dateStr) return "Unknown";
      const d = new Date(dateStr);
      return `WE ${(d.getMonth()+1).toString().padStart(2,"0")}/${d.getDate().toString().padStart(2,"0")}/${d.getFullYear()}`;
    }

    /* ─── SHARED COMPONENTS ──────────────────────────────────────────────────── */
    const StatCard = ({ label, value, sub, accent, icon }) => (
      <div style={{ background:"#0f1923", border:`1px solid ${accent}33`, borderTop:`3px solid ${accent}`, borderRadius:8, padding:"18px 22px", flex:1, minWidth:150 }}>
        <div style={{ fontSize:10, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.12em", textTransform:"uppercase", color:"#7a8fa6", marginBottom:6 }}>
          {icon && <span style={{marginRight:5}}>{icon}</span>}{label}
        </div>
        <div style={{ fontSize:26, fontWeight:800, fontFamily:"'Barlow Condensed',sans-serif", color:"#f0f6ff", letterSpacing:"-0.5px" }}>{value}</div>
        {sub && <div style={{ fontSize:11, color:"#4a6680", marginTop:3 }}>{sub}</div>}
      </div>
    );

    const CustomTooltip = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background:"#0a1a2a", border:"1px solid #1e3a55", borderRadius:8, padding:"12px 16px", fontSize:12 }}>
          <div style={{ color:"#60a8d8", fontWeight:700, marginBottom:6 }}>{label}</div>
          {payload.map(p => (
            <div key={p.name} style={{ color:p.color, marginBottom:2 }}>{p.name}: <strong>{fmt(p.value)}</strong></div>
          ))}
        </div>
      );
    };

    /* ─── WORKER TABLE ───────────────────────────────────────────────────────── */
    function WorkerTable({ records }) {
      return (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:"#0a1520" }}>
                {["Worker","Customer","Title","Pay Rate","Bill Rate","Reg Hrs","OT Hrs","Total Hrs","Gross Sales","Gross Wages","Profit"].map(h => (
                  <th key={h} style={{ padding:"9px 12px", textAlign:"left", color:"#4a8fb8", fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.07em", fontSize:10, textTransform:"uppercase", borderBottom:"1px solid #1a2d40", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {records.map((r,i) => (
                <tr key={i} style={{ background:i%2===0?"#0d1e2e":"#0f2133", borderBottom:"1px solid #142030" }}>
                  <td style={{ padding:"10px 12px", color:"#cce4ff", fontWeight:600, whiteSpace:"nowrap" }}>{r.candidateName}</td>
                  <td style={{ padding:"10px 12px", color:"#8ab0cc", whiteSpace:"nowrap" }}>{r.customer}</td>
                  <td style={{ padding:"10px 12px", color:"#6890a8", whiteSpace:"nowrap", maxWidth:160, overflow:"hidden", textOverflow:"ellipsis" }}>{r.jobTitle}</td>
                  <td style={{ padding:"10px 12px", color:"#f0c060", whiteSpace:"nowrap" }}>${r.payRate}/hr</td>
                  <td style={{ padding:"10px 12px", color:"#d0a040", whiteSpace:"nowrap" }}>${r.billRate}/hr</td>
                  <td style={{ padding:"10px 12px", color:"#8ab0cc" }}>{r.regHoursBilled.toFixed(2)}</td>
                  <td style={{ padding:"10px 12px", color:r.otHoursBilled>0?"#e09040":"#4a6680" }}>{r.otHoursBilled.toFixed(2)}</td>
                  <td style={{ padding:"10px 12px", color:"#a0c8e0", fontWeight:600 }}>{totalHours(r).toFixed(2)}</td>
                  <td style={{ padding:"10px 12px", color:"#60c8f8" }}>{fmt(r.grossSales)}</td>
                  <td style={{ padding:"10px 12px", color:"#f0c060" }}>{fmt(r.grossWages)}</td>
                  <td style={{ padding:"10px 12px", color:"#40e090", fontWeight:700 }}>{fmt(r.agentProfit)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ─── UPLOAD PANEL ───────────────────────────────────────────────────────── */
    function UploadPanel({ onUpload, uploadHistory }) {
      const [dragging, setDragging] = useState(false);
      const [status, setStatus]     = useState("");
      const [confirmDel, setConfirmDel] = useState(null);

      const processFile = useCallback((file) => {
        if (!file) return;
        setStatus("Parsing…");
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const records = parseBullhornXLSX(new Uint8Array(e.target.result));
            if (!records.length) { setStatus("⚠ No valid rows found. Check column headers."); return; }
            const periods = [...new Set(records.map(r => r.periodEnd))];
            onUpload(records, file.name, periods[0]);
            setStatus(`✓ ${records.length} records imported · ${new Set(records.map(r=>r.branch)).size} agents · ${periods.map(weekLabel).join(", ")}`);
          } catch (err) { setStatus("⚠ Parse error: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }, [onUpload]);

      return (
        <div style={{ padding:28 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#cce4ff", marginBottom:6 }}>Upload Weekly BullhornONE Report</div>
          <div style={{ fontSize:12, color:"#4a6680", marginBottom:20 }}>Upload the SA_data_WE_*.xlsx export each week. Past data is preserved automatically in your browser.</div>

          <div
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0]);}}
            onClick={()=>document.getElementById("xlsxUpload").click()}
            style={{ border:`2px dashed ${dragging?"#4a8fb8":"#1e3a55"}`, borderRadius:12, padding:"48px 32px", textAlign:"center", cursor:"pointer", background:dragging?"#0e2035":"#0a1520", transition:"all 0.2s" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>📊</div>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, color:"#8ab0cc", marginBottom:6 }}>Drop BullhornONE XLSX here or click to browse</div>
            <div style={{ fontSize:11, color:"#4a6680" }}>Accepts: SA_data_WE_[date].xlsx</div>
            <input id="xlsxUpload" type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])} />
          </div>

          {status && (
            <div style={{ marginTop:16, padding:"12px 16px", borderRadius:8, background:status.startsWith("✓")?"#0a2a1a":"#2a1a0a", border:`1px solid ${status.startsWith("✓")?"#40e09040":"#e0a04040"}`, color:status.startsWith("✓")?"#40e090":"#e0a040", fontSize:13 }}>
              {status}
            </div>
          )}

          {uploadHistory.length > 0 && (
            <div style={{ marginTop:28 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, color:"#8ab0cc", marginBottom:12, letterSpacing:"0.06em", textTransform:"uppercase" }}>Upload History</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {uploadHistory.slice().reverse().map((h,i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:8, padding:"12px 16px" }}>
                    <div>
                      <div style={{ fontSize:13, color:"#cce4ff", fontWeight:600 }}>{weekLabel(h.periodEnd)}</div>
                      <div style={{ fontSize:11, color:"#4a6680", marginTop:2 }}>{h.filename} · {h.recordCount} records · {h.agentCount} agents · {h.uploadedAt}</div>
                    </div>
                    <div style={{ fontSize:11, color:"#4a6680" }}>{h.uploadedAt}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─── AGENT MANAGEMENT ───────────────────────────────────────────────────── */
    function AgentManagement({ allAgentNames, agentProfiles, setAgentProfiles }) {
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name:"", password:"staffing123", email:"", phone:"", notes:"" });
      const allNames = [...new Set([...allAgentNames, ...Object.keys(agentProfiles)])].sort();

      const save = () => {
        const key = editing === "new" ? form.name.trim() : editing;
        if (!key) return;
        const updated = { ...agentProfiles, [key]: { ...(agentProfiles[key]||{}), password:form.password, email:form.email, phone:form.phone, notes:form.notes, addedAt:agentProfiles[key]?.addedAt||new Date().toLocaleDateString() } };
        setAgentProfiles(updated);
        setEditing(null);
      };
      const toggle = (name) => {
        const cur = agentProfiles[name]?.enabled !== false;
        setAgentProfiles({ ...agentProfiles, [name]: { ...(agentProfiles[name]||{}), enabled:!cur } });
      };
      const resetPw = (name) => setAgentProfiles({ ...agentProfiles, [name]: { ...(agentProfiles[name]||{}), password:"staffing123" } });

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, color:"#cce4ff" }}>Agent Management</div>
            <button onClick={()=>{setEditing("new");setForm({name:"",password:"staffing123",email:"",phone:"",notes:""});}} style={{ background:"#1e4a78", color:"#cce4ff", border:"1px solid #4a8fb8", borderRadius:8, padding:"8px 18px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", textTransform:"uppercase" }}>+ Add Agent</button>
          </div>

          {editing && (
            <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:20, marginBottom:18 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#cce4ff", marginBottom:14 }}>{editing==="new"?"Add New Agent":`Edit: ${editing}`}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                {editing==="new" && (
                  <div>
                    <label style={{ display:"block", fontSize:10, fontWeight:700, color:"#4a6680", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:5 }}>Agency Name *</label>
                    <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={{ width:"100%", background:"#0a1520", border:"1px solid #1e3a55", borderRadius:7, padding:"9px 11px", color:"#cce4ff", fontSize:12, outline:"none", boxSizing:"border-box" }} />
                  </div>
                )}
                {[["Password","password"],["Email","email"],["Phone","phone"]].map(([l,k])=>(
                  <div key={k}>
                    <label style={{ display:"block", fontSize:10, fontWeight:700, color:"#4a6680", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:5 }}>{l}</label>
                    <input value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} style={{ width:"100%", background:"#0a1520", border:"1px solid #1e3a55", borderRadius:7, padding:"9px 11px", color:"#cce4ff", fontSize:12, outline:"none", boxSizing:"border-box" }} />
                  </div>
                ))}
                <div style={{ gridColumn:"1 / -1" }}>
                  <label style={{ display:"block", fontSize:10, fontWeight:700, color:"#4a6680", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:5 }}>Notes</label>
                  <input value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} style={{ width:"100%", background:"#0a1520", border:"1px solid #1e3a55", borderRadius:7, padding:"9px 11px", color:"#cce4ff", fontSize:12, outline:"none", boxSizing:"border-box" }} />
                </div>
              </div>
              <div style={{ display:"flex", gap:8, marginTop:14 }}>
                <button onClick={save} style={{ background:"#1e4a78", color:"#cce4ff", border:"1px solid #4a8fb8", borderRadius:8, padding:"8px 18px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", textTransform:"uppercase" }}>Save</button>
                <button onClick={()=>setEditing(null)} style={{ background:"#0a1520", border:"1px solid #1e3a55", color:"#4a6680", borderRadius:8, padding:"8px 14px", fontSize:12, cursor:"pointer" }}>Cancel</button>
              </div>
            </div>
          )}

          <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:"#0a1520" }}>
                  {["Agency Name","Email","Phone","Password","Status","Notes","Actions"].map(h=>(
                    <th key={h} style={{ padding:"10px 12px", textAlign:"left", color:"#4a8fb8", fontFamily:"'Barlow Condensed',sans-serif", fontSize:10, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:"1px solid #1a2d40", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {allNames.map((name,i)=>{
                  const p = agentProfiles[name]||{};
                  const enabled = p.enabled !== false;
                  return (
                    <tr key={name} style={{ background:i%2===0?"#0d1e2e":"#0f2133", borderBottom:"1px solid #142030", opacity:enabled?1:0.6 }}>
                      <td style={{ padding:"9px 12px", color:"#cce4ff", fontWeight:600 }}>
                        {name}
                        {allAgentNames.includes(name) && <span style={{ fontSize:9, color:"#4a6680", marginLeft:5 }}>BH</span>}
                      </td>
                      <td style={{ padding:"9px 12px", color:"#8ab0cc" }}>{p.email||"—"}</td>
                      <td style={{ padding:"9px 12px", color:"#8ab0cc", whiteSpace:"nowrap" }}>{p.phone||"—"}</td>
                      <td style={{ padding:"9px 12px", color:"#4a6680", fontFamily:"monospace" }}>{"•".repeat(Math.min((p.password||"staffing123").length,10))}</td>
                      <td style={{ padding:"9px 12px" }}>
                        <span onClick={()=>toggle(name)} style={{ background:enabled?"#0a2a1a":"#2a0a0a", color:enabled?"#40e090":"#e06060", border:`1px solid ${enabled?"#40e09040":"#e0606040"}`, borderRadius:20, padding:"2px 10px", fontSize:10, fontWeight:700, cursor:"pointer" }}>
                          {enabled?"Active":"Disabled"}
                        </span>
                      </td>
                      <td style={{ padding:"9px 12px", color:"#4a6680", maxWidth:150, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.notes||"—"}</td>
                      <td style={{ padding:"9px 12px", whiteSpace:"nowrap" }}>
                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={()=>{setEditing(name);setForm({name,password:p.password||"staffing123",email:p.email||"",phone:p.phone||"",notes:p.notes||""});}} style={{ background:"none", border:"1px solid #1e3a55", color:"#4a8fb8", borderRadius:5, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>✎ Edit</button>
                          <button onClick={()=>resetPw(name)} style={{ background:"none", border:"1px solid #1e3a55", color:"#4a6680", borderRadius:5, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>↺ PW</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop:10, fontSize:11, color:"#4a6680" }}>Default password: <code style={{ background:"#0a1520", padding:"1px 5px", borderRadius:4, color:"#8ab0cc" }}>staffing123</code> · BH = auto-registered from BullhornONE data</div>
        </div>
      );
    }

    /* ─── MAIN APP ───────────────────────────────────────────────────────────── */
    function StaffingDashboard() {
      const [loggedIn, setLoggedIn]       = useState(false);
      const [currentAgent, setCurrentAgent] = useState(null);
      const [loginInput, setLoginInput]   = useState({ id:"", pass:"" });
      const [loginError, setLoginError]   = useState("");

      const [allUploads, setAllUploads]       = useState([]);
      const [uploadHistory, setUploadHistory] = useState([]);
      const [agentProfiles, setAgentProfilesState] = useState({});
      const [storageLoaded, setStorageLoaded] = useState(false);

      const [activeTab, setActiveTab]     = useState("overview");
      const [selectedWeek, setSelectedWeek] = useState(null);
      const [agentFilter, setAgentFilter] = useState(null);

      useEffect(() => {
        const stored   = loadStoredData();
        const profiles = loadAgentProfiles();
        if (stored.uploads) { setAllUploads(stored.uploads); setUploadHistory(stored.history||[]); }
        setAgentProfilesState(profiles);
        setStorageLoaded(true);
      }, []);

      const setAgentProfiles = useCallback((updated) => {
        setAgentProfilesState(updated);
        saveAgentProfiles(updated);
      }, []);

      const allWeeks   = useMemo(() => [...new Set(allUploads.map(u=>u.periodEnd))].sort(), [allUploads]);
      const latestWeek = allWeeks[allWeeks.length-1] || null;
      const displayWeek = selectedWeek || latestWeek;

      const currentWeekRecords = useMemo(() => {
        if (!displayWeek) return [];
        return allUploads.find(u=>u.periodEnd===displayWeek)?.records || [];
      }, [allUploads, displayWeek]);

      const allAgentNames = useMemo(() => {
        const s = new Set();
        allUploads.forEach(u => u.records.forEach(r => s.add(r.branch)));
        return [...s].sort();
      }, [allUploads]);

      const agentRecords = useMemo(() =>
        currentAgent ? currentWeekRecords.filter(r=>r.branch===currentAgent) : currentWeekRecords,
      [currentWeekRecords, currentAgent]);

      const displayRecords = agentFilter ? agentRecords.filter(r=>r.branch===agentFilter) : agentRecords;

      const kpi = useMemo(() => ({
        workers:    displayRecords.length,
        revenue:    displayRecords.reduce((s,r)=>s+r.grossSales,0),
        payroll:    displayRecords.reduce((s,r)=>s+r.grossWages,0),
        profit:     displayRecords.reduce((s,r)=>s+r.agentProfit,0),
        customers:  new Set(displayRecords.map(r=>r.customer)).size,
        totalHours: displayRecords.reduce((s,r)=>s+totalHours(r),0),
      }), [displayRecords]);

      const historicalData = useMemo(() => allWeeks.map(week => {
        const recs = (allUploads.find(u=>u.periodEnd===week)?.records||[]).filter(r=>!currentAgent||r.branch===currentAgent);
        return { period:weekLabel(week), revenue:recs.reduce((s,r)=>s+r.grossSales,0), payroll:recs.reduce((s,r)=>s+r.grossWages,0), profit:recs.reduce((s,r)=>s+r.agentProfit,0), workers:recs.length };
      }), [allUploads, allWeeks, currentAgent]);

      const customerBreakdown = useMemo(() => {
        const map = {};
        displayRecords.forEach(r => {
          if (!map[r.customer]) map[r.customer] = { customer:r.customer, workers:[], revenue:0, payroll:0, profit:0 };
          map[r.customer].workers.push(r);
          map[r.customer].revenue += r.grossSales;
          map[r.customer].payroll += r.grossWages;
          map[r.customer].profit  += r.agentProfit;
        });
        return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
      }, [displayRecords]);

      const workerProfitData = useMemo(() =>
        displayRecords.slice().sort((a,b)=>b.agentProfit-a.agentProfit).slice(0,20)
          .map(r=>({ name:r.candidateName.split(" ")[0]+" "+r.candidateName.split(" ").slice(-1)[0], profit:r.agentProfit })),
      [displayRecords]);

      const handleUpload = useCallback((records, filename, periodEnd) => {
        setAllUploads(prev => {
          const idx = prev.findIndex(u=>u.periodEnd===periodEnd);
          const entry = { periodEnd, records, filename };
          const updated = idx>=0 ? prev.map((u,i)=>i===idx?entry:u) : [...prev, entry];
          setUploadHistory(h => {
            const newH = [...h, { periodEnd, filename, recordCount:records.length, agentCount:new Set(records.map(r=>r.branch)).size, uploadedAt:new Date().toLocaleDateString() }];
            saveStoredData({ uploads:updated, history:newH });
            return newH;
          });
          setSelectedWeek(periodEnd);
          return updated;
        });
      }, []);

      const handleLogin = () => {
        if (loginInput.id.toUpperCase()==="ADMIN" && loginInput.pass==="uss2026!") {
          setCurrentAgent(null); setLoggedIn(true); setLoginError(""); return;
        }
        const match = allAgentNames.find(n=>n.toLowerCase().replace(/\s+/g,"")===loginInput.id.toLowerCase().replace(/\s+/g,""));
        if (!match) { setLoginError("Agent not found. Use your full agency name or contact Admin."); return; }
        const profile = agentProfiles[match];
        if (profile?.enabled===false) { setLoginError("This account has been disabled. Contact Admin."); return; }
        if (loginInput.pass===(profile?.password||"staffing123")) { setCurrentAgent(match); setLoggedIn(true); setLoginError(""); }
        else { setLoginError("Incorrect password. Please try again."); }
      };

      const tabs = currentAgent
        ? [["overview","Overview"],["workers","Workers"],["customers","Customers"],["analytics","Analytics"]]
        : [["overview","Overview"],["workers","Workers"],["customers","Customers"],["analytics","Analytics"],["manage","Agent Mgmt"],["upload","Upload Data"]];

      /* ── LOGIN ── */
      if (!loggedIn) {
        return (
          <div style={{ minHeight:"100vh", background:"#060e18", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
            <div style={{ width:"100%", maxWidth:420 }}>
              <div style={{ textAlign:"center", marginBottom:32 }}>
                <img src="https://www.usastaffingservices.com/wp-content/uploads/2022/11/USA-Staffing-Services.png"
                  alt="USA Staffing Services" style={{ height:52, filter:"brightness(0) invert(1)", objectFit:"contain" }}
                  onError={e=>{e.target.style.display="none";}} />
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, color:"#4a8fb8", letterSpacing:"0.1em", textTransform:"uppercase", marginTop:12 }}>Staffing Agent Portal</div>
              </div>

              <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:12, padding:32 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:"#cce4ff", marginBottom:4 }}>Welcome back</div>
                <div style={{ fontSize:12, color:"#4a6680", marginBottom:24 }}>Sign in to your agent dashboard</div>

                {[["Agent ID / Agency Name","id","text","e.g. BlueCloud Staffing or ADMIN"],["Password","pass","password","••••••••"]].map(([label,key,type,ph])=>(
                  <div key={key} style={{ marginBottom:16 }}>
                    <label style={{ display:"block", fontSize:10, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"#4a6680", marginBottom:6 }}>{label}</label>
                    <input type={type} value={loginInput[key]} placeholder={ph}
                      onChange={e=>setLoginInput(p=>({...p,[key]:e.target.value}))}
                      onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                      style={{ width:"100%", background:"#0a1520", border:"1px solid #1e3a55", borderRadius:8, padding:"11px 14px", color:"#cce4ff", fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:"'Barlow',sans-serif" }} />
                  </div>
                ))}

                {loginError && <div style={{ color:"#e06060", fontSize:12, marginBottom:14, background:"#2a0a0a", padding:"10px 14px", borderRadius:6, border:"1px solid #e0606040" }}>⚠ {loginError}</div>}

                <button onClick={handleLogin} style={{ width:"100%", background:"linear-gradient(135deg,#1e6aaa,#0e4488)", color:"#cce4ff", border:"none", borderRadius:8, padding:"13px", fontSize:14, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", boxShadow:"0 4px 20px #1e6aaa44", marginBottom:20 }}>
                  Sign In →
                </button>

                <div style={{ background:"#0a1520", border:"1px solid #1a3050", borderRadius:8, padding:14 }}>
                  <div style={{ fontSize:10, color:"#4a6680", fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Demo Credentials</div>
                  <div style={{ fontSize:12, color:"#4a8fb8", marginBottom:4 }}>Admin: <strong style={{color:"#cce4ff"}}>ADMIN</strong> / <strong style={{color:"#cce4ff"}}>uss2026!</strong></div>
                  <div style={{ fontSize:12, color:"#4a8fb8", marginBottom:4 }}>Agent: use agency name / <strong style={{color:"#cce4ff"}}>staffing123</strong></div>
                  <div style={{ fontSize:10, color:"#4a6680", marginTop:6 }}>Upload data first to unlock agent logins</div>
                </div>
              </div>

              <div style={{ textAlign:"center", marginTop:20, fontSize:11, color:"#1e3a55" }}>
                © USA Staffing Services · 3502 Henderson Blvd, Tampa, FL · (877) 312-8964
              </div>
            </div>
          </div>
        );
      }

      /* ── DASHBOARD ── */
      return (
        <div style={{ minHeight:"100vh", background:"#060e18", color:"#cce4ff", fontFamily:"'Barlow',sans-serif" }}>
          <div style={{ position:"fixed", inset:0, backgroundImage:"linear-gradient(#1a3a5508 1px,transparent 1px),linear-gradient(90deg,#1a3a5508 1px,transparent 1px)", backgroundSize:"40px 40px", pointerEvents:"none" }} />

          {/* HEADER */}
          <header style={{ position:"sticky", top:0, zIndex:100, background:"#0a1520ee", backdropFilter:"blur(12px)", borderBottom:"1px solid #1a3050", padding:"0 24px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", height:58 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <img src="https://www.usastaffingservices.com/wp-content/uploads/2022/11/USA-Staffing-Services.png"
                  alt="USS" style={{ height:28, filter:"brightness(0) invert(1)", objectFit:"contain" }}
                  onError={e=>{e.target.style.display="none";}} />
                <div style={{ width:1, height:18, background:"#1e3a55" }} />
                <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:800, color:"#cce4ff" }}>
                  {currentAgent||"Admin Dashboard"}
                </span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {allWeeks.length > 0 && (
                  <select value={displayWeek||""} onChange={e=>setSelectedWeek(e.target.value)}
                    style={{ background:"#0a1520", border:"1px solid #1e3a55", color:"#cce4ff", borderRadius:6, padding:"5px 10px", fontSize:12, outline:"none", cursor:"pointer" }}>
                    {allWeeks.slice().reverse().map(w=>(
                      <option key={w} value={w}>{weekLabel(w)}{w===latestWeek?" (latest)":""}</option>
                    ))}
                  </select>
                )}
                {!currentAgent && allAgentNames.length > 0 && (
                  <select value={agentFilter||""} onChange={e=>setAgentFilter(e.target.value||null)}
                    style={{ background:"#0a1520", border:"1px solid #1e3a55", color:"#cce4ff", borderRadius:6, padding:"5px 10px", fontSize:12, outline:"none", cursor:"pointer", maxWidth:180 }}>
                    <option value="">All Agents</option>
                    {allAgentNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                )}
                <button onClick={()=>{setLoggedIn(false);setCurrentAgent(null);}}
                  style={{ background:"#0a1a2a", border:"1px solid #1e3a55", color:"#4a8fb8", borderRadius:6, padding:"5px 12px", fontSize:11, cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", textTransform:"uppercase", letterSpacing:"0.06em" }}>
                  Sign Out
                </button>
              </div>
            </div>
            <div style={{ display:"flex", gap:2, overflowX:"auto" }}>
              {tabs.map(([id,label])=>(
                <button key={id} onClick={()=>setActiveTab(id)} style={{
                  background:"none", border:"none",
                  borderBottom:activeTab===id?"2px solid #4a8fb8":"2px solid transparent",
                  color:activeTab===id?"#cce4ff":"#4a6680",
                  padding:"9px 16px", fontSize:12, fontWeight:700, cursor:"pointer",
                  fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.06em", textTransform:"uppercase", whiteSpace:"nowrap",
                }}>{label}{id==="upload"?" +":""}</button>
              ))}
            </div>
          </header>

          <main style={{ padding:24, maxWidth:1400, margin:"0 auto" }}>

            {allUploads.length===0 && activeTab!=="upload" && (
              <div style={{ textAlign:"center", padding:"80px 0" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>📊</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, color:"#8ab0cc", marginBottom:8 }}>No data loaded yet</div>
                <div style={{ color:"#4a6680", fontSize:13, marginBottom:24 }}>Upload your first BullhornONE weekly report to get started</div>
                <button onClick={()=>setActiveTab("upload")} style={{ background:"linear-gradient(135deg,#1e6aaa,#0e4488)", color:"#cce4ff", border:"none", borderRadius:8, padding:"12px 28px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.08em", textTransform:"uppercase" }}>
                  Upload Weekly Report →
                </button>
              </div>
            )}

            {/* OVERVIEW */}
            {activeTab==="overview" && allUploads.length>0 && (
              <>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:24 }}>
                  <StatCard label="Active Workers"   value={kpi.workers}              sub={`Week ending ${weekLabel(displayWeek)}`}                                    accent="#4a8fb8" icon="👷" />
                  <StatCard label="Gross Revenue"    value={fmt(kpi.revenue)}         sub="Total billed to clients"                                                     accent="#60c8f8" icon="📈" />
                  <StatCard label="Gross Payroll"    value={fmt(kpi.payroll)}         sub="Total wages + burden"                                                        accent="#f0c060" icon="💰" />
                  <StatCard label="Agent Profit"     value={fmt(kpi.profit)}          sub={kpi.revenue>0?`${((kpi.profit/kpi.revenue)*100).toFixed(1)}% margin`:""}    accent="#40e090" icon="⭐" />
                  <StatCard label="Active Customers" value={kpi.customers}            sub="End-user clients"                                                            accent="#a060e8" icon="🏢" />
                  <StatCard label="Total Hours"      value={kpi.totalHours.toFixed(1)} sub="Reg + OT billed"                                                           accent="#e06888" icon="⏱" />
                </div>

                <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22, marginBottom:20 }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#cce4ff", marginBottom:4 }}>Profit Per Worker — {weekLabel(displayWeek)}</div>
                  <div style={{ fontSize:11, color:"#4a6680", marginBottom:18 }}>Agent profit generated from each temporary worker this week</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                    {displayRecords.slice().sort((a,b)=>b.agentProfit-a.agentProfit).map((r,i)=>{
                      const pct = kpi.profit>0?(r.agentProfit/kpi.profit)*100:0;
                      return (
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <div style={{ width:150, fontSize:11, color:"#cce4ff", fontWeight:600, flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.candidateName}</div>
                          <div style={{ width:140, fontSize:10, color:"#4a8fb8", flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.customer}</div>
                          <div style={{ flex:1, background:"#0a1520", borderRadius:3, height:7 }}>
                            <div style={{ height:"100%", width:`${Math.max(pct,0.5)}%`, background:r.agentProfit>=0?"linear-gradient(90deg,#1e6aaa,#40e090)":"#e06060", borderRadius:3 }} />
                          </div>
                          <div style={{ width:80, textAlign:"right", fontSize:12, fontWeight:700, color:r.agentProfit>=0?"#40e090":"#e06060", flexShrink:0 }}>{fmt(r.agentProfit)}</div>
                          <div style={{ width:52, textAlign:"right", fontSize:10, color:"#4a6680", flexShrink:0 }}>{totalHours(r).toFixed(1)}h</div>
                        </div>
                      );
                    })}
                    <div style={{ borderTop:"1px solid #1a3050", paddingTop:10, marginTop:4, display:"flex", justifyContent:"flex-end", gap:24 }}>
                      <span style={{ fontSize:11, color:"#4a6680" }}>Revenue: <span style={{color:"#60c8f8"}}>{fmt(kpi.revenue)}</span></span>
                      <span style={{ fontSize:11, color:"#4a6680" }}>Payroll: <span style={{color:"#f0c060"}}>{fmt(kpi.payroll)}</span></span>
                      <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:800, color:"#40e090" }}>Total Profit: {fmt(kpi.profit)}</span>
                    </div>
                  </div>
                </div>

                {historicalData.length > 1 && (
                  <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22 }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:"#cce4ff", marginBottom:16 }}>Historical Trend — All Uploaded Weeks</div>
                    <ResponsiveContainer width="100%" height={200}>
                      <AreaChart data={historicalData}>
                        <defs>
                          <linearGradient id="revG" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#4a8fb8" stopOpacity={0.3}/><stop offset="95%" stopColor="#4a8fb8" stopOpacity={0}/></linearGradient>
                          <linearGradient id="profG" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#40e090" stopOpacity={0.3}/><stop offset="95%" stopColor="#40e090" stopOpacity={0}/></linearGradient>
                        </defs>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1a2d40" />
                        <XAxis dataKey="period" tick={{fill:"#4a6680",fontSize:10}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fill:"#4a6680",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={fmtK} />
                        <Tooltip content={<CustomTooltip />} />
                        <Area type="monotone" dataKey="revenue" stroke="#4a8fb8" fill="url(#revG)" strokeWidth={2} name="Revenue" />
                        <Area type="monotone" dataKey="profit"  stroke="#40e090" fill="url(#profG)" strokeWidth={2} name="Profit" />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                )}
              </>
            )}

            {/* WORKERS */}
            {activeTab==="workers" && allUploads.length>0 && (
              <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#cce4ff", marginBottom:4 }}>Temporary Workers on Assignment</div>
                <div style={{ fontSize:11, color:"#4a6680", marginBottom:18 }}>{displayRecords.length} workers · {weekLabel(displayWeek)}{!currentAgent&&agentFilter&&<span> · Filtered: {agentFilter}</span>}</div>
                <WorkerTable records={displayRecords} />
              </div>
            )}

            {/* CUSTOMERS */}
            {activeTab==="customers" && allUploads.length>0 && (
              <div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#cce4ff", marginBottom:20 }}>End-User Customers — {weekLabel(displayWeek)}</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:16 }}>
                  {customerBreakdown.map(c=>(
                    <div key={c.customer} style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:20, minWidth:260, flex:"1 1 260px" }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#60c8f8", marginBottom:12 }}>{c.customer}</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                        {[["Workers on Site",c.workers.length,"#cce4ff"],["Gross Revenue",fmt(c.revenue),"#60c8f8"],["Gross Payroll",fmt(c.payroll),"#f0c060"],["Agent Profit",fmt(c.profit),"#40e090"]].map(([label,val,color])=>(
                          <div key={label} style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
                            <span style={{color:"#4a6680"}}>{label}</span><span style={{color,fontWeight:600}}>{val}</span>
                          </div>
                        ))}
                      </div>
                      <div style={{ marginTop:12, borderTop:"1px solid #1a3050", paddingTop:10 }}>
                        {c.workers.map((w,i)=>(
                          <div key={i} style={{ fontSize:10, color:"#6890a8", paddingBottom:2 }}>· {w.candidateName} — {totalHours(w).toFixed(1)}h · {fmt(w.agentProfit)} profit</div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ANALYTICS */}
            {activeTab==="analytics" && allUploads.length>0 && (
              <>
                <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22, marginBottom:18 }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#cce4ff", marginBottom:18 }}>Weekly Revenue vs. Payroll vs. Profit</div>
                  <ResponsiveContainer width="100%" height={260}>
                    <BarChart data={historicalData} barGap={3}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1a2d40" />
                      <XAxis dataKey="period" tick={{fill:"#4a6680",fontSize:10}} axisLine={false} tickLine={false} />
                      <YAxis tick={{fill:"#4a6680",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={fmtK} />
                      <Tooltip content={<CustomTooltip />} />
                      <Legend wrapperStyle={{fontSize:11,color:"#8ab0cc"}} />
                      <Bar dataKey="revenue" name="Revenue" fill="#1e5a8a" radius={[3,3,0,0]} />
                      <Bar dataKey="payroll" name="Payroll" fill="#0e3058" radius={[3,3,0,0]} />
                      <Bar dataKey="profit"  name="Profit"  fill="#20a060" radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22, marginBottom:18 }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#cce4ff", marginBottom:18 }}>Top Worker Profit — {weekLabel(displayWeek)}</div>
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={workerProfitData} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke="#1a2d40" horizontal={false} />
                      <XAxis type="number" tick={{fill:"#4a6680",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>"$"+v.toFixed(0)} />
                      <YAxis type="category" dataKey="name" tick={{fill:"#8ab0cc",fontSize:10}} axisLine={false} tickLine={false} width={120} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="profit" name="Profit" fill="#1e6aaa" radius={[0,4,4,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22 }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#cce4ff", marginBottom:16 }}>Weekly Summary</div>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead>
                      <tr style={{ background:"#0a1520" }}>
                        {["Week Ending","Workers","Revenue","Payroll","Profit","Margin %"].map(h=>(
                          <th key={h} style={{ padding:"9px 12px", textAlign:"left", color:"#4a8fb8", fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.07em", fontSize:10, textTransform:"uppercase", borderBottom:"1px solid #1a2d40" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {historicalData.slice().reverse().map((row,i)=>(
                        <tr key={i} style={{ background:i%2===0?"#0d1e2e":"#0f2133", borderBottom:"1px solid #142030" }}>
                          <td style={{ padding:"10px 12px", color:"#8ab0cc" }}>{row.period}</td>
                          <td style={{ padding:"10px 12px", color:"#cce4ff" }}>{row.workers}</td>
                          <td style={{ padding:"10px 12px", color:"#60c8f8" }}>{fmt(row.revenue)}</td>
                          <td style={{ padding:"10px 12px", color:"#f0c060" }}>{fmt(row.payroll)}</td>
                          <td style={{ padding:"10px 12px", color:"#40e090", fontWeight:700 }}>{fmt(row.profit)}</td>
                          <td style={{ padding:"10px 12px", color:"#cce4ff" }}>{row.revenue>0?((row.profit/row.revenue)*100).toFixed(1)+"%":"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}

            {/* AGENT MANAGEMENT (Admin) */}
            {activeTab==="manage" && (
              <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10, padding:22 }}>
                <AgentManagement allAgentNames={allAgentNames} agentProfiles={agentProfiles} setAgentProfiles={setAgentProfiles} />
              </div>
            )}

            {/* UPLOAD (Admin) */}
            {activeTab==="upload" && (
              <div style={{ background:"#0d1e2e", border:"1px solid #1a3050", borderRadius:10 }}>
                <UploadPanel onUpload={handleUpload} uploadHistory={uploadHistory} />
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<StaffingDashboard />);
  </script>
</body>
</html>
