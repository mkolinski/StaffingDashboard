    /* ─── XLSX PARSER ────────────────────────────────────────────────────────── */
    function parseBullhornXLSX(buffer) {
      const wb = XLSX.read(buffer, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { raw: false, defval: "" });
      const records = [];
      for (const row of rows) {
        const branch = (row["Branch"] || "").trim();
        const candidate = (row["Candidate Name"] || "").trim();
        if (!branch || !candidate) continue;
        const periodRaw = row["Billing Period End Date"];
        let periodDate = null;
        if (periodRaw) { const d = new Date(periodRaw); if (!isNaN(d)) periodDate = d.toISOString().split("T")[0]; }
        const p = (v) => parseFloat(String(v).replace(/[$,]/g,"")) || 0;
        records.push({
          branch, candidate,
          customer: (row["Customer"] || "").trim(),
          periodEnd: periodDate,
          jobTitle: (row["Job Title"] || "").trim(),
          payRate: p(row["Pay Rate_"]),
          billRate: p(row["Bill Rate_"]),
          regHoursBilled: p(row["Reg Hours Billed"]),
          otHoursBilled: p(row["OT Hours Billed"]),
          grossSales: p(row["Gross Sales Amount"]),
          grossWages: p(row["Gross Wages Amount"]),
          burdenAmt: p(row["Assignment Burden ($)"]),
          agentProfit: p(row["Staffing Agent Profit"]),
        });
      }
      return records;
    }

    function parseInvoiceXLSX(buffer) {
      const wb = XLSX.read(buffer, { type: "array", cellDates: true });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: false, defval: "" });
      const p = (v) => parseFloat(String(v).replace(/[$,]/g,"")) || 0;
      const pd = (v) => {
        if (!v) return null;
        // Handle JS Date objects from cellDates:true
        if (v instanceof Date || (typeof v === "object" && v.getFullYear)) {
          const d = new Date(v);
          return isNaN(d) ? null : d.toISOString().split("T")[0];
        }
        const d = new Date(v);
        return isNaN(d) ? null : d.toISOString().split("T")[0];
      };
      return rows.map(row => {
        // Support both your BullhornONE invoice export and generic formats
        const num = (
          row["Invoice Statement Number"] ||
          row["Invoice #"] || row["Invoice Number"] || row["Invoice No"] ||
          ""
        ).toString().trim();
        if (!num) return null;

        // Balance due: if Status is "Finalized" / paid, outstanding may already be 0
        const balance = p(
          row["Outstanding Balance"] || row["Balance Due"] || row["Balance"] || row["Open Balance"] || "0"
        );
        const amount = p(
          row["Total Amount"] || row["Amount"] || row["Invoice Amount"] || "0"
        );

        return {
          invoiceNum: num,
          customer: (row["Company Name"] || row["Customer"] || row["Client"] || "").trim(),
          branch: (row["Branch"] || row["Agent"] || "").trim(),
          invoiceDate: pd(row["Invoice Statement Date"] || row["Invoice Date"] || row["Date"]),
          statementDate: pd(row["Invoice Statement Date"] || row["Statement Date"]),
          invoiceAmount: amount,
          balanceDue: balance,
          // Carry over the native Status field if present so auto-status logic can use it
          manualStatus: (() => {
            const s = (row["Status"] || "").toLowerCase();
            const paid = p(row["Paid Status ID"] || "0");
            if (balance <= 0 && amount > 0) return null; // let auto-logic mark as Paid
            if (s.includes("final") && paid === 1 && balance <= 0) return null;
            return null; // always let auto balance logic determine status
          })(),
        };
      }).filter(Boolean);
    }

    /* ─── UTILITIES ──────────────────────────────────────────────────────────── */
    const fmt  = (n) => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtK = (n) => "$" + ((Number(n)||0)/1000).toFixed(1) + "k";
    const th   = (r) => (r.regHoursBilled||0) + (r.otHoursBilled||0);

    function weekLabel(d) {
      if (!d) return "—";
      const dt = new Date(d + "T12:00:00");
      return `WE ${(dt.getMonth()+1).toString().padStart(2,"0")}/${dt.getDate().toString().padStart(2,"0")}/${dt.getFullYear()}`;
    }

    function invStatus(inv) {
      if (inv.manualStatus) return inv.manualStatus;
      if (inv.balanceDue <= 0) return "Paid";
      if (inv.balanceDue < inv.invoiceAmount) return "Partial";
      return "Unpaid";
    }

    /* ─── UPLOAD PANEL ───────────────────────────────────────────────────────── */
    function UploadPanel({ onUpload, onDelete, uploadHistory, saving }) {
      const [dragging, setDragging] = useState(false);
      const [status, setStatus]     = useState("");
      const [confirmDel, setConfirmDel] = useState(null);

      const processFile = useCallback((file) => {
        if (!file) return;
        setStatus("Parsing…");
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const records = parseBullhornXLSX(new Uint8Array(e.target.result));
            if (!records.length) { setStatus("⚠ No valid rows found. Check column headers."); return; }
            const periodEnd = records.find(r => r.periodEnd)?.periodEnd;
            if (!periodEnd) { setStatus("⚠ Could not determine billing period date."); return; }
            setStatus("Saving to database…");
            await onUpload(records, file.name, periodEnd);
            setStatus(`✓ ${records.length} records saved · ${new Set(records.map(r=>r.branch)).size} agents · ${weekLabel(periodEnd)}`);
          } catch (err) { setStatus("⚠ Error: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }, [onUpload]);

      return (
        <div style={{ padding:28 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#1a2332", marginBottom:4 }}>Upload Weekly BullhornONE Report</div>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:20 }}>Data is saved to Supabase and shared with all users instantly.</div>

          <div
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0]);}}
            onClick={()=>document.getElementById("xlsxUpload").click()}
            style={{ border:`2px dashed ${dragging?"#c8102e":"#cbd5e1"}`, borderRadius:12, padding:"44px 32px", textAlign:"center", cursor:"pointer", background:dragging?"#fff1f2":"#f8fafc", transition:"all 0.2s" }}>
            <div style={{ fontSize:32, marginBottom:10 }}>📊</div>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, color:"#475569", marginBottom:5 }}>Drop SA_data_WE_*.xlsx here or click to browse</div>
            <div style={{ fontSize:11, color:"#64748b" }}>Columns: Branch, Candidate Name, Billing Period End Date, Gross Sales, Gross Wages, Staffing Agent Profit…</div>
            <input id="xlsxUpload" type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])} />

          {status && (

              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {uploadHistory.slice().reverse().map((h,i) => (

    /* ─── MAIN APP ───────────────────────────────────────────────────────────── */
    function StaffingDashboard() {
      const [loggedIn, setLoggedIn]       = useState(false);
      const [currentAgent, setCurrentAgent] = useState(null);
      const [loginInput, setLoginInput]   = useState({ id:"", pass:"" });
      const [loginError, setLoginError]   = useState("");
      const [loading, setLoading]         = useState(true);

      const [allUploads, setAllUploads]     = useState([]);
      const [agentProfiles, setAgentProfiles] = useState({});
      const [invoices, setInvoices]         = useState([]);

      const [activeTab, setActiveTab]     = useState("overview");
      const [selectedWeek, setSelectedWeek] = useState(null);
      const [agentFilter, setAgentFilter] = useState(null);

      // Load all data from Supabase on mount
      useEffect(() => {
        async function loadAll() {
          setLoading(true);
          const [uploads, profiles, invs] = await Promise.all([
            dbLoadUploads(),
            dbLoadAgentProfiles(),
            dbLoadInvoices(),
          ]);
          setAllUploads(uploads);
          setAgentProfiles(profiles);
          setInvoices(invs);
          setLoading(false);
        }
        loadAll();
      }, []);

      const allWeeks    = useMemo(() => [...new Set(allUploads.map(u=>u.periodEnd))].sort(), [allUploads]);
      const latestWeek  = allWeeks[allWeeks.length-1] || null;
      const displayWeek = selectedWeek || latestWeek;

      const currentWeekRecords = useMemo(() =>
        allUploads.find(u=>u.periodEnd===displayWeek)?.records || [],
      [allUploads, displayWeek]);

      const allAgentNames = useMemo(() => {
        const s = new Set();
        allUploads.forEach(u => u.records.forEach(r => s.add(r.branch)));
        return [...s].sort();
      }, [allUploads]);

      const agentRecords = useMemo(() =>
        currentAgent ? currentWeekRecords.filter(r=>r.branch===currentAgent) : currentWeekRecords,
      [currentWeekRecords, currentAgent]);

      const displayRecords = agentFilter ? agentRecords.filter(r=>r.branch===agentFilter) : agentRecords;

      const kpi = useMemo(() => ({
        workers:    displayRecords.length,
        revenue:    displayRecords.reduce((s,r)=>s+r.grossSales,0),
        payroll:    displayRecords.reduce((s,r)=>s+r.grossWages,0),
        profit:     displayRecords.reduce((s,r)=>s+r.agentProfit,0),
        customers:  new Set(displayRecords.map(r=>r.customer)).size,
        totalHours: displayRecords.reduce((s,r)=>s+th(r),0),
      }), [displayRecords]);

      const historicalData = useMemo(() => allWeeks.map(week => {
        const recs = (allUploads.find(u=>u.periodEnd===week)?.records||[]).filter(r=>!currentAgent||r.branch===currentAgent);
        return { period:weekLabel(week), revenue:recs.reduce((s,r)=>s+r.grossSales,0), payroll:recs.reduce((s,r)=>s+r.grossWages,0), profit:recs.reduce((s,r)=>s+r.agentProfit,0), workers:recs.length };
      }), [allUploads, allWeeks, currentAgent]);

      const customerBreakdown = useMemo(() => {
        const map = {};
        displayRecords.forEach(r => {
          if (!map[r.customer]) map[r.customer] = { customer:r.customer, workers:[], revenue:0, payroll:0, burden:0, profit:0 };
          map[r.customer].workers.push(r);
          map[r.customer].revenue += r.grossSales;
          map[r.customer].payroll += r.grossWages;
          map[r.customer].burden  += r.burdenAmt || 0;
          map[r.customer].profit  += r.agentProfit;
        });
        return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
      }, [displayRecords]);

      // Agent summary — all agents, current week
      const agentSummary = useMemo(() => {
        const map = {};
        currentWeekRecords.forEach(r => {
          const b = r.branch;
          if (!map[b]) map[b] = { branch:b, workers:new Set(), customers:new Set(), revenue:0, payroll:0, burden:0, profit:0, hours:0, records:[] };
          map[b].workers.add(r.candidate||r.candidateName||"");
          map[b].customers.add(r.customer);
          map[b].revenue += r.grossSales;
          map[b].payroll += r.grossWages;
          map[b].burden  += r.burdenAmt || 0;
          map[b].profit  += r.agentProfit;
          map[b].hours   += th(r);
          map[b].records.push(r);
        });
        return Object.values(map).sort((a,b)=>b.profit-a.profit).map(a=>({
          ...a, workerCount:a.workers.size, customerCount:a.customers.size
        }));
      }, [currentWeekRecords]);

      const workerProfitData = useMemo(() =>
        displayRecords.slice().sort((a,b)=>b.agentProfit-a.agentProfit).slice(0,20)
          .map(r=>({ name:(r.candidate||r.candidateName||"").split(" ").filter(Boolean).map((w,i,a)=>i===0||i===a.length-1?w:"").filter(Boolean).join(" "), profit:r.agentProfit })),
      [displayRecords]);

      // Invoice profit linkage
      // ── PROFIT & AGENT MATCHING ──────────────────────────────────────────────
      // Invoice file has no Branch column, so we derive agent from payroll data.
      // Match key: normalized customer name (strip punctuation, lowercase, collapse spaces)
      const norm = (s) => (s||"").toLowerCase().replace(/[.,\/#!$%^&*;:{}=\-_`~()]/g,"").replace(/\s+/g," ").trim();

      // Build lookup: normalizedCustomer -> { profit, branch, weeks }
      const payrollByCustomer = useMemo(() => {
        const map = {};
        allUploads.forEach(u => (u.records||[]).forEach(r => {
          const key = norm(r.customer);
          if (!key) return;
          if (!map[key]) map[key] = { profit:0, branch:r.branch, customers:new Set(), weeks:new Set() };
          map[key].profit += r.agentProfit;
          map[key].customers.add(r.customer);
          map[key].weeks.add(r.periodEnd);
          // Keep the most recent branch if multiple
          map[key].branch = r.branch;
        }));
        return map;
      }, [allUploads]);

      const enrichedInvoices = useMemo(() => invoices.map(inv => {
        const key = norm(inv.customer);
        const payroll = payrollByCustomer[key];
        const linked = payroll ? payroll.profit : null;
        // Derive branch from payroll data if not on invoice
        const derivedBranch = inv.branch || (payroll ? payroll.branch : "");
        const lp     = inv.manualProfit !== undefined ? inv.manualProfit : (linked || 0);
        const status = invStatus(inv);
        return {
          ...inv,
          branch: derivedBranch,
          linkedProfit: lp,
          profitMatched: linked !== null,
          status,
          paidAmount: inv.invoiceAmount - inv.balanceDue,
          pendingProfit: status !== "Paid" ? lp : 0,
          paidProfit:    status === "Paid"  ? lp : 0,
        };
      }), [invoices, payrollByCustomer]);

      const agentInvoices = useMemo(() =>
        currentAgent
          ? enrichedInvoices.filter(inv => norm(inv.branch) === norm(currentAgent))
          : enrichedInvoices,
      [enrichedInvoices, currentAgent]);

      const profitSummary = useMemo(() => {
        const src = currentAgent ? agentInvoices : enrichedInvoices;
        return { pendingProfit:src.reduce((s,i)=>s+i.pendingProfit,0), paidProfit:src.reduce((s,i)=>s+i.paidProfit,0), unpaidCount:src.filter(i=>i.status==="Unpaid").length, partialCount:src.filter(i=>i.status==="Partial").length, paidCount:src.filter(i=>i.status==="Paid").length };
      }, [enrichedInvoices, agentInvoices, currentAgent]);

      // Handlers
      const handleUpload = useCallback(async (records, filename, periodEnd) => {
        await dbSaveUpload(periodEnd, filename, records);
        const uploads = await dbLoadUploads();
        setAllUploads(uploads);
        setSelectedWeek(periodEnd);
        // Auto-register new agents
        const newBranches = [...new Set(records.map(r=>r.branch))];
        const profiles = { ...agentProfiles };
        let changed = false;

              <>
                <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:22, marginBottom:16, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#1a2332", marginBottom:16 }}>Weekly Revenue vs. Payroll vs. Profit</div>
                  <ResponsiveContainer width="100%" height={250}>
                    <BarChart data={historicalData} barGap={3}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                      <XAxis dataKey="period" tick={{fill:"#64748b",fontSize:10}} axisLine={false} tickLine={false} />
                      <YAxis tick={{fill:"#64748b",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={fmtK} />
                      <Tooltip content={<CustomTooltip />} />
                      <Legend wrapperStyle={{fontSize:11,color:"#475569"}} />
                      <Bar dataKey="revenue" name="Revenue" fill="#1d4ed8" radius={[3,3,0,0]} />
                      <Bar dataKey="payroll" name="Payroll" fill="#d97706" radius={[3,3,0,0]} />
                      <Bar dataKey="profit"  name="Profit"  fill="#16a34a" radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:22, marginBottom:16, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#1a2332", marginBottom:16 }}>Top Worker Profit — {weekLabel(displayWeek)}</div>
                  <ResponsiveContainer width="100%" height={230}>
                    <BarChart data={workerProfitData} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" horizontal={false} />
                      <XAxis type="number" tick={{fill:"#64748b",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>"$"+v.toFixed(0)} />
                      <YAxis type="category" dataKey="name" tick={{fill:"#475569",fontSize:10}} axisLine={false} tickLine={false} width={120} />
                      <Tooltip content={<CustomTooltip />} />
                      <Bar dataKey="profit" name="Profit" fill="#c8102e" radius={[0,4,4,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:22, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:"#1a2332", marginBottom:14 }}>Weekly Summary</div>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead>
                      <tr style={{ background:"#f8fafc" }}>
                        {["Week Ending","Workers","Revenue","Payroll","Profit","Margin"].map(h=>(
                          <th key={h} style={{ padding:"9px 12px", textAlign:"left", color:"#c8102e", fontFamily:"'Barlow Condensed',sans-serif", fontSize:10, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:"1px solid #e2e8f0" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {historicalData.slice().reverse().map((row,i)=>(
                        <tr key={i} style={{ background:i%2===0?"#ffffff":"#f8fafc", borderBottom:"1px solid #f1f5f9" }}>
                          <td style={{ padding:"9px 12px", color:"#475569" }}>{row.period}</td>
                          <td style={{ padding:"9px 12px", color:"#1a2332" }}>{row.workers}</td>
                          <td style={{ padding:"9px 12px", color:"#1d4ed8" }}>{fmt(row.revenue)}</td>
                          <td style={{ padding:"9px 12px", color:"#d97706" }}>{fmt(row.payroll)}</td>
                          <td style={{ padding:"9px 12px", color:"#16a34a", fontWeight:700 }}>{fmt(row.profit)}</td>
                          <td style={{ padding:"9px 12px", color:"#1a2332" }}>{row.revenue>0?((row.profit/row.revenue)*100).toFixed(1)+"%":"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}

            {/* AGENT SUMMARY (admin) */}
            {activeTab==="agents" && allUploads.length>0 && (
              <div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:"#1a2332", marginBottom:4 }}>Summary by Staffing Agent — {weekLabel(displayWeek)}</div>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:20 }}>{agentSummary.length} agents · sorted by profit</div>

                {/* Top-level stat row */}
                <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:22 }}>
                  {[
                    ["👷 Total Workers", currentWeekRecords.length, "#2563eb"],
                    ["📈 Gross Revenue", fmt(currentWeekRecords.reduce((s,r)=>s+r.grossSales,0)), "#1d4ed8"],
                    ["💰 Gross Payroll", fmt(currentWeekRecords.reduce((s,r)=>s+r.grossWages,0)), "#d97706"],
                    ["🔩 Total Burden", fmt(currentWeekRecords.reduce((s,r)=>s+(r.burdenAmt||0),0)), "#92400e"],
                    ["⭐ Total Profit", fmt(currentWeekRecords.reduce((s,r)=>s+r.agentProfit,0)), "#16a34a"],
                  ].map(([label,value,accent])=>(
                    <div key={label} style={{ background:"#ffffff", border:`1px solid ${accent}22`, borderTop:`4px solid ${accent}`, borderRadius:10, padding:"14px 18px", flex:1, minWidth:130, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                      <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.12em", textTransform:"uppercase", color:"#64748b", marginBottom:4 }}>{label}</div>
                      <div style={{ fontSize:22, fontWeight:800, fontFamily:"'Barlow Condensed',sans-serif", color:accent }}>{value}</div>
                    </div>
                  ))}
                </div>

                {/* Per-agent cards */}
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  {agentSummary.map((agent, idx) => {
                    const totalProfit = currentWeekRecords.reduce((s,r)=>s+r.agentProfit,0);
                    const pct = totalProfit > 0 ? (agent.profit / totalProfit) * 100 : 0;
                    const margin = agent.revenue > 0 ? (agent.profit / agent.revenue) * 100 : 0;
                    return (
                      <div key={agent.branch} style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:20, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                        {/* Agent header */}
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:8 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <div style={{ background:"#fef2f2", borderRadius:"50%", width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:14, color:"#c8102e", flexShrink:0 }}>
                              {agent.branch.charAt(0).toUpperCase()}
                            </div>
                            <div>
                              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:800, color:"#1a2332" }}>{agent.branch}</div>
                              <div style={{ fontSize:10, color:"#64748b", marginTop:1 }}>{agent.workerCount} worker{agent.workerCount!==1?"s":""} · {agent.customerCount} customer{agent.customerCount!==1?"s":""} · {agent.hours.toFixed(1)}h billed</div>
                            </div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:"#16a34a" }}>{fmt(agent.profit)}</div>
                            <div style={{ fontSize:10, color:"#64748b" }}>{margin.toFixed(1)}% margin · {pct.toFixed(1)}% of total</div>
                          </div>
                        </div>

                        {/* Profit share bar */}
                        <div style={{ background:"#f8fafc", borderRadius:4, height:6, marginBottom:14 }}>
                          <div style={{ height:"100%", width:`${Math.max(pct,0.3)}%`, background:"linear-gradient(90deg,#c8102e,#16a34a)", borderRadius:4 }} />
                        </div>

                        {/* Stats row */}
                        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:14 }}>
                          {[
                            ["Gross Revenue", fmt(agent.revenue), "#1d4ed8"],
                            ["Gross Payroll", fmt(agent.payroll), "#d97706"],
                            ["Burden $",      fmt(agent.burden),  "#92400e"],
                            ["Agent Profit",  fmt(agent.profit),  "#16a34a"],
                          ].map(([label, value, color])=>(
                            <div key={label} style={{ background:"#f8fafc", borderRadius:7, padding:"10px 14px", flex:1, minWidth:110 }}>
                              <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:"0.1em", textTransform:"uppercase", color:"#64748b", marginBottom:3 }}>{label}</div>
                              <div style={{ fontSize:16, fontWeight:800, fontFamily:"'Barlow Condensed',sans-serif", color }}>{value}</div>
                            </div>
                          ))}
                        </div>

                        {/* Per-worker bars */}
                        <div style={{ borderTop:"1px solid #f1f5f9", paddingTop:12 }}>
                          <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8 }}>Workers</div>
                          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                            {agent.records.slice().sort((a,b)=>b.agentProfit-a.agentProfit).map((r,i)=>{
                              const wp = agent.profit > 0 ? (r.agentProfit / agent.profit) * 100 : 0;
                              return (
                                <div key={i} style={{ display:"flex", alignItems:"center", gap:8 }}>
                                  <div style={{ width:140, fontSize:11, color:"#1a2332", flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.candidate||r.candidateName}</div>
                                  <div style={{ width:120, fontSize:10, color:"#64748b", flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.customer}</div>
                                  <div style={{ flex:1, background:"#e2e8f0", borderRadius:3, height:5 }}>
                                    <div style={{ height:"100%", width:`${Math.max(wp,0.5)}%`, background:r.agentProfit>=0?"linear-gradient(90deg,#c8102e,#16a34a)":"#dc2626", borderRadius:3 }} />
                                  </div>
                                  <div style={{ width:76, textAlign:"right", fontSize:11, fontWeight:700, color:r.agentProfit>=0?"#16a34a":"#dc2626", flexShrink:0 }}>{fmt(r.agentProfit)}</div>
                                  <div style={{ width:44, textAlign:"right", fontSize:10, color:"#94a3b8", flexShrink:0 }}>{th(r).toFixed(1)}h</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* INVOICES (admin) */}
            {activeTab==="invoices" && (
              <InvoiceTab invoices={enrichedInvoices} allAgentNames={allAgentNames} onUpload={handleInvoiceUpload} onOverride={handleInvoiceOverride} onDeleteAll={handleDeleteAllInvoices} onDeleteOne={handleDeleteInvoice} />
            )}

            {/* AGENT MANAGEMENT (admin) */}
            {activeTab==="manage" && (
              <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:22, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                <AgentManagement allAgentNames={allAgentNames} agentProfiles={agentProfiles} onSave={handleSaveAgent} />
              </div>
            )}

            {/* UPLOAD (admin) */}
            {activeTab==="upload" && (
              <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:10 }}>
                <UploadPanel onUpload={handleUpload} onDelete={handleDelete} uploadHistory={uploadHistory} />
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<StaffingDashboard />);
  </script>
</body>
</html>
